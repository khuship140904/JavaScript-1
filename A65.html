<body>
    <h1>INDEX PAGE</h1>

    <hr>

    <script>
        class student{
            constructor(name,age,college){
                this.name=name;
                this.age=age;
                this.college=college;
            }

            showInfo(){
                console.log(this.name,this.age,this.college);
            }
        }

        const a= new student('dholu',7,'dholakpur');
        const b= new student('jaggu',8,'balampur');

        a.showInfo();
        b.showInfo();

    </script>
