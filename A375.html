<body>
    <script>
        let x = [34,55,12,37,9,10,11,3,22,59];

        let oddcount=0;
        let evencount=0;

        for (next of x) {

            if (next%2) {
                oddcount++;
            }
            else{
                evencount++;
            }    
        }

        console.log(oddcount);
        console.log(evencount);
    </script>
