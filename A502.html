<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="a">

        <img src="1 (1).png"  id="b">

    </div>

    <script>
        const b = document.querySelector('#b');

        let arr = ['1 (1).png','1 (2).png','1 (3).png','1 (4).png','1 (5).png','1 (6).png'];


        b.addEventListener('click' , ()=>{
            let next = Math.ceil(Math.random()*6)-1;
            b.src = arr[next];
        })
    </script>
</body>
</html>
