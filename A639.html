<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{

        }
    </style>
</head>
<body>
    <h1>Helloo...!!!!</h1>

    <hr>

    <table id="tbl" align="center" border="1">
        <tr>
            <th>UserId</th>
            <th>Id</th>
            <th>title</th>
            <th>Completed</th>
        </tr>

    </table>

    <button type="button" id="btn"> Send Request </button>

    <script>
        const btn = document.querySelector('#btn');
        const tbl = document.querySelector('#tbl');

        btn.addEventListener('click' , () =>{


            for(let i = 1;i<=10;i++){
                const req= new XMLHttpRequest();
    
                req.open('GET' , 'https://jsonplaceholder.typicode.com/todos/' + i, false);
    
                req.addEventListener('readystatechange',()=>{
                    if (req.readyState == 4 && req.status == 200) {
    
                        let jsObj = JSON.parse(req.responseText);
    
                        let row = tbl.insertRow(i);
                        
                    let j=0;
                    for(let prop in jsObj){
                       let cell = row.insertCell(j++);
                       cell.innerText = jsObj[prop];
                    }
    
                    }
                });
             req.send();

            }
        });
        
    </script>
</body>
</html>
