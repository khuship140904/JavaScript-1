<!DOCTYPE html>

<body>
    <h1>ARRAY DEMO</h1>

    <Script>
        let x =[1,2,3,4,5,6,7,8,9];

        let sum =0;

        for(next of x){
            sum =sum+next;

        }

        console.log(sum);
    </Script>
</body>
