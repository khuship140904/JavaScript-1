<!DOCTYPE html>
<html lang="en">
<head>                                                                                                                                                                      
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="para" onmouseover="aaa()" onmouseout="bbb()">Hello everyone</p>

    <script>
        const y = document.querySelector('#para');


       function aaa(){
            y.style.fontSize='60px'
        }
       function bbb(){
            y.style.fontSize='10px'
        }
    </script>
</body>
</html>
